# ============================================================
#  Site settings
# ============================================================
title: "Mason Buttner"                 # TODO: confirm name
description: "Quantitative trading research — systematic strategies, backtesting, and market microstructure."
url: "https://sharpeshooter02.github.io"
baseurl: ""                            # leave "" for a user site (USERNAME.github.io); set "/REPO" for a project site

# Minimal Mistakes theme via GitHub Pages remote_theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"       # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# Build settings
markdown: kramdown
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Reading
paginate: 5
paginate_path: /page:num/
timezone: America/New_York

# ============================================================
#  Author profile (the sidebar shown beside every page)
# ============================================================
author:
  name: "Mason Buttner"                 # TODO: confirm your display name
  # avatar: "/assets/images/bio-photo.jpg"  # add a square headshot here, then uncomment
  bio: "Quantitative trading research and systematic strategy design."  # TODO: refine your 1-2 sentence bio
  location: "United States"             # TODO: optional
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:buttnermason@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SharpeShooter02"
    # - label: "LinkedIn"    # add your LinkedIn URL here, then uncomment
    #   icon: "fab fa-fw fa-linkedin"
    #   url: "https://www.linkedin.com/in/YOUR-HANDLE"

# Footer links (optional, mirror the above)
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SharpeShooter02"

# ============================================================
#  Defaults — turn the profile sidebar + read time on site-wide
# ============================================================
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Exclude non-site files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
